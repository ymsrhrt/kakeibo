<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿 2026</title>

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --border: #e8e6e0;
    --text: #1a1a18; --muted: #888680; --accent: #2c6e49;
    --red: #c0392b; --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  .app { max-width: 520px; margin: 0 auto; padding: 0 0 80px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 3px 10px; cursor: pointer; font-size: 13px; color: var(--muted); font-family: inherit; }
  .month-nav span { font-size: 14px; font-weight: 500; min-width: 70px; text-align: center; }
  .period-label { font-size: 11px; color: var(--muted); text-align: center; padding-bottom: 8px; }
  .sync-status { font-size: 11px; text-align: center; padding: 3px 0 6px; }
  .sync-status.ok { color: var(--accent); }
  .sync-status.err { color: var(--red); }
  .sync-status.loading { color: var(--muted); }
  .tabs { display: flex; }
  .tab { flex: 1; padding: 9px 4px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 12px; color: var(--muted); font-family: inherit; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .content { padding: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; box-shadow: var(--shadow); }
  .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .metric-value { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .metric-value.green { color: var(--accent); }
  .metric-value.red { color: var(--red); }
  .form-group { margin-bottom: 10px; }
  .form-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: block; }
  .form-group input, .form-group select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-add { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; }
  .btn-add:active { opacity: 0.85; }
  .btn-add:disabled { opacity: 0.5; }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: none; font-family: inherit; font-size: 13px; cursor: pointer; color: var(--muted); }
  .type-btn.active-exp { background: #fdecea; border-color: var(--red); color: var(--red); font-weight: 500; }
  .type-btn.active-inc { background: #e8f5ee; border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row-left { display: flex; align-items: center; gap: 9px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .row-name { font-size: 13px; }
  .row-sub { font-size: 11px; color: var(--muted); }
  .row-right { display: flex; align-items: center; gap: 8px; }
  .row-amount { font-size: 14px; font-weight: 500; }
  .row-amount.inc { color: var(--accent); }
  .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; padding: 2px; }
  .date-hdr { font-size: 11px; color: var(--muted); font-weight: 500; padding: 7px 0 3px; }
  .empty { text-align: center; padding: 28px 0; color: var(--muted); font-size: 13px; }
  .budget-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .budget-row:last-child { border-bottom: none; }
  .budget-bar-wrap { flex: 1; margin: 0 10px; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .budget-bar { height: 100%; border-radius: 3px; }
  .budget-bar.over { background: var(--red) !important; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .chart-wrap { position: relative; width: 100%; }
  .income-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .income-row:last-child { border-bottom: none; }
  .total-row { display: flex; justify-content: space-between; padding: 10px 0; font-weight: 700; font-size: 14px; border-top: 1px solid var(--border); margin-top: 4px; }
  .remaining-bar-wrap { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .remaining-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .page { display: none; }
  .page.active { display: block; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 4px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>💰 2026家計管理</h1>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="period-label" id="period-label"></div>
    <div class="sync-status loading" id="sync-status"><span class="spinner"></span>同期中...</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('input',this)">入力</button>
      <button class="tab" onclick="switchTab('list',this)">履歴</button>
      <button class="tab" onclick="switchTab('budget',this)">予算</button>
      <button class="tab" onclick="switchTab('graph',this)">グラフ</button>
      <button class="tab" onclick="switchTab('summary',this)">サマリー</button>
    </div>
  </div>
  <div class="content">
    <div id="page-input" class="page active">
      <div class="card">
        <div class="type-toggle">
          <button class="type-btn active-exp" id="btn-exp" onclick="setType('expense')">− 支出</button>
          <button class="type-btn" id="btn-inc" onclick="setType('income')">＋ 収入</button>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">日付</label><input type="date" id="inp-date"></div>
          <div class="form-group"><label class="form-label">金額（円）</label><input type="number" id="inp-amount" placeholder="3500" min="0"></div>
        </div>
        <div class="form-group"><label class="form-label">カテゴリ</label><select id="inp-cat"></select></div>
        <div class="form-group"><label class="form-label">メモ（任意）</label><input type="text" id="inp-memo" placeholder="例：スーパーで買い物"></div>
        <button class="btn-add" id="btn-submit" onclick="addEntry()">追加する</button>
      </div>
      <div class="card"><div class="card-title">今日の記録</div><div id="today-list"></div></div>
    </div>
    <div id="page-list" class="page">
      <div class="card"><div class="card-title" id="list-title">履歴</div><div id="list-content"></div></div>
    </div>
    <div id="page-budget" class="page">
      <div class="metrics">
        <div class="metric"><div class="metric-label">収入合計</div><div class="metric-value green" id="bud-income">¥0</div></div>
        <div class="metric"><div class="metric-label">支出合計</div><div class="metric-value red" id="bud-expense">¥0</div></div>
        <div class="metric"><div class="metric-label">残高</div><div class="metric-value" id="bud-balance">¥0</div></div>
      </div>
      <div class="card">
        <div class="card-title">残り使える額（食費・日用品 ＋ 外食）</div>
        <div id="remaining-detail"></div>
      </div>
      <div class="card"><div class="card-title">カテゴリ別 予算 vs 実績</div><div id="budget-list"></div></div>
    </div>
    <div id="page-graph" class="page">
      <div class="card">
        <div class="card-title">カテゴリ別 支出内訳</div>
        <div id="graph-legend" class="legend"></div>
        <div class="chart-wrap" style="height:250px;"><canvas id="cat-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">期間別 支出推移（18日締め）</div>
        <div class="chart-wrap" style="height:180px;"><canvas id="month-chart"></canvas></div>
      </div>
    </div>
    <div id="page-summary" class="page">
      <div class="card"><div class="card-title">収入内訳</div><div id="sum-income"></div></div>
      <div class="card"><div class="card-title">カテゴリ別 支出合計</div><div id="sum-expense"></div></div>
    </div>
  </div>
</div>

let sheetData=[];
let entryType='expense';
function currentPeriod(){const today=new Date();const y=today.getFullYear();const m=today.getMonth();const d=today.getDate();if(d>=19){return{month:m+1>11?0:m+1,fullYear:m+1>11?y+1:y};}return{month:m,fullYear:y};}
const cp=currentPeriod();
let curMonth=cp.month;let curYear=cp.fullYear;
let catChart=null,monthChart=null;
const MONTHS_JP=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function getPeriodRange(year,month){return{startDate:new Date(year,month-1,19),endDate:new Date(year,month,18)};}
function dateInPeriod(dateStr,year,month){const{startDate,endDate}=getPeriodRange(year,month);const d=new Date(dateStr);d.setHours(0,0,0,0);startDate.setHours(0,0,0,0);endDate.setHours(0,0,0,0);return d>=startDate&&d<=endDate;}
function periodLabel(year,month){const{startDate,endDate}=getPeriodRange(year,month);return`${startDate.getMonth()+1}/${startDate.getDate()} 〜 ${endDate.getMonth()+1}/${endDate.getDate()}`;}
function allData(){const sheetIds=new Set(sheetData.map(e=>String(e.id)));const filtered=HISTORICAL.filter(e=>!sheetIds.has(String(e.id)));return[...filtered,...sheetData];}
function fmt(n){return'¥'+Math.round(Math.abs(n)).toLocaleString();}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function periodFilter(arr){return arr.filter(e=>dateInPeriod(e.date,curYear,curMonth));}
function setSyncStatus(type,msg){const el=document.getElementById('sync-status');el.className='sync-status '+type;el.innerHTML=type==='loading'?`<span class="spinner"></span>${msg}`:msg;}
async function syncFromSheet(){
  setSyncStatus('loading','同期中...');
  try{
    const res=await fetch(GAS_URL,{method:'GET',redirect:'follow'});
    const json=await res.json();
    if(json.success){
      sheetData=json.entries.map(e=>({id:Number(e.id),date:e.date,type:e.type,cat:e.cat,amount:Number(e.amount),memo:e.memo||''})).filter(e=>e.id&&e.date);
      setSyncStatus('ok',`✓ 同期完了（${sheetData.length}件）`);
    }else{throw new Error();}
  }catch(err){setSyncStatus('err','⚠ オフライン（ローカルデータで表示中）');}
  renderAll();
}
async function postToSheet(action,payload){
  const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),redirect:'follow'});
  return await res.json();
}
document.getElementById('inp-date').value=todayStr();
function updateLabels(){document.getElementById('month-label').textContent=MONTHS_JP[curMonth]+'分';document.getElementById('period-label').textContent='📅 '+periodLabel(curYear,curMonth);}
function changeMonth(dir){curMonth+=dir;if(curMonth<0){curMonth=11;curYear--;}if(curMonth>11){curMonth=0;curYear++;}updateLabels();renderAll();}
function setType(t){
  entryType=t;
  document.getElementById('btn-exp').className='type-btn'+(t==='expense'?' active-exp':'');
  document.getElementById('btn-inc').className='type-btn'+(t==='income'?' active-inc':'');
  const sel=document.getElementById('inp-cat');sel.innerHTML='';
  (t==='expense'?EXP_CATS:INC_CATS).forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;sel.appendChild(o);});
}
setType('expense');
async function addEntry(){
  const date=document.getElementById('inp-date').value;
  const amount=parseInt(document.getElementById('inp-amount').value);
  const cat=document.getElementById('inp-cat').value;
  const memo=document.getElementById('inp-memo').value.trim();
  if(!date||!amount||amount<=0){alert('日付と金額を入力してください');return;}
  const entry={id:Date.now(),date,type:entryType,cat,amount,memo};
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='送信中...';
  setSyncStatus('loading','保存中...');
  try{
    const result=await postToSheet('add',{entry});
    if(result.success){sheetData.push(entry);setSyncStatus('ok','✓ 保存しました');}
    else{throw new Error();}
  }catch(e){setSyncStatus('err','⚠ 保存失敗。再試行してください');}
  btn.disabled=false;btn.textContent='追加する';
  document.getElementById('inp-amount').value='';document.getElementById('inp-memo').value='';
  renderAll();
}
async function deleteEntry(id){
  if(id<100000){alert('過去データは削除できません');return;}
  if(!confirm('削除しますか？'))return;
  setSyncStatus('loading','削除中...');
  try{
    const result=await postToSheet('delete',{id});
    if(result.success){sheetData=sheetData.filter(e=>e.id!==id);setSyncStatus('ok','✓ 削除しました');}
    else{throw new Error();}
  }catch(e){setSyncStatus('err','⚠ 削除失敗');}
  renderAll();
}
function entryRow(e){const color=CAT_COLOR[e.cat]||'#888';const isInc=e.type==='income';return`<div class="row"><div class="row-left"><div class="dot" style="background:${color}"></div><div><div class="row-name">${e.memo||e.cat}</div><div class="row-sub">${e.cat}</div></div></div><div class="row-right"><span class="row-amount ${isInc?'inc':''}">${isInc?'＋':''}${fmt(e.amount)}</span><button class="btn-del" onclick="deleteEntry(${e.id})">✕</button></div></div>`;}
function renderToday(){const today=todayStr();const items=allData().filter(e=>e.date===today).sort((a,b)=>b.id-a.id);document.getElementById('today-list').innerHTML=items.length?items.map(entryRow).join(''):'<div class="empty">まだ記録がありません</div>';}
function renderList(){document.getElementById('list-title').textContent=MONTHS_JP[curMonth]+'分（'+periodLabel(curYear,curMonth)+'）';const items=periodFilter(allData()).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);const el=document.getElementById('list-content');if(!items.length){el.innerHTML='<div class="empty">記録がありません</div>';return;}const grouped={};items.forEach(e=>(grouped[e.date]=grouped[e.date]||[]).push(e));el.innerHTML=Object.entries(grouped).map(([date,es])=>{const d=new Date(date);return`<div class="date-hdr">${d.getMonth()+1}月${d.getDate()}日</div>`+es.map(entryRow).join('');}).join('');}
function renderBudget(){const items=periodFilter(allData());const totalInc=items.filter(e=>e.type==='income').reduce((a,b)=>a+b.amount,0);const totalExp=items.filter(e=>e.type==='expense').reduce((a,b)=>a+b.amount,0);const balance=totalInc-totalExp;document.getElementById('bud-income').textContent=fmt(totalInc);document.getElementById('bud-expense').textContent=fmt(totalExp);const balEl=document.getElementById('bud-balance');balEl.textContent=(balance<0?'-':'')+fmt(balance);balEl.className='metric-value '+(balance>=0?'green':'red');const catExp={};items.filter(e=>e.type==='expense').forEach(e=>catExp[e.cat]=(catExp[e.cat]||0)+e.amount);const foodBudget=(BUDGETS['食費・日用品']||0)+(BUDGETS['外食']||0);const foodActual=(catExp['食費・日用品']||0)+(catExp['外食']||0);const foodRemain=foodBudget-foodActual;const foodPct=Math.min(foodActual/foodBudget*100,100);const foodOver=foodActual>foodBudget;document.getElementById('remaining-detail').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:13px;">予算 ${fmt(foodBudget)} ／ 使用 ${fmt(foodActual)}</span><span style="font-size:16px;font-weight:700;color:${foodOver?'var(--red)':'var(--accent)'};">${foodOver?'超過 -':'残り '}${fmt(Math.abs(foodRemain))}</span></div><div class="remaining-bar-wrap"><div class="remaining-bar" style="width:${foodPct.toFixed(0)}%;background:${foodOver?'var(--red)':'var(--accent)'}"></div></div>`;const cats=[...new Set([...Object.keys(BUDGETS),...Object.keys(catExp)])];document.getElementById('budget-list').innerHTML=cats.map(cat=>{const budget=BUDGETS[cat]||0;const actual=catExp[cat]||0;if(!budget&&!actual)return'';const pct=budget>0?Math.min(actual/budget*100,100):100;const over=actual>budget&&budget>0;const color=CAT_COLOR[cat]||'#888';return`<div class="budget-row"><div style="min-width:90px;font-size:12px;">${cat}</div><div class="budget-bar-wrap"><div class="budget-bar${over?' over':''}" style="width:${pct.toFixed(0)}%;${over?'':'background:'+color}"></div></div><div style="min-width:90px;text-align:right;font-size:12px;"><span style="color:${over?'var(--red)':'var(--text)'};">${fmt(actual)}</span>${budget?`<span style="color:var(--muted);"> / ${fmt(budget)}</span>`:''}</div></div>`;}).join('');}
function renderGraph(){const items=periodFilter(allData()).filter(e=>e.type==='expense');const catTotals={};items.forEach(e=>catTotals[e.cat]=(catTotals[e.cat]||0)+e.amount);const labels=Object.keys(catTotals);const vals=labels.map(l=>catTotals[l]);const colors=labels.map(l=>CAT_COLOR[l]||'#888');const total=vals.reduce((a,b)=>a+b,0);const legend=document.getElementById('graph-legend');if(!labels.length){legend.innerHTML='';if(catChart){catChart.destroy();catChart=null;}return;}legend.innerHTML=labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div><span>${l} ${Math.round(vals[i]/total*100)}%</span></div>`).join('');if(catChart)catChart.destroy();catChart=new Chart(document.getElementById('cat-chart'),{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)+' ('+Math.round(ctx.raw/total*100)+'%)'}}}}});const last6=[];for(let i=5;i>=0;i--){let m=curMonth-i,y=curYear;if(m<0){m+=12;y--;}if(m>11){m-=12;y++;}const mo=allData().filter(e=>dateInPeriod(e.date,y,m)&&e.type==='expense');last6.push({label:MONTHS_JP[m],total:mo.reduce((a,b)=>a+b.amount,0)});}if(monthChart)monthChart.destroy();monthChart=new Chart(document.getElementById('month-chart'),{type:'bar',data:{labels:last6.map(l=>l.label),datasets:[{data:last6.map(l=>l.total),backgroundColor:last6.map((_,i)=>i===5?'#2c6e49':'#c8dfd1'),borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},scales:{y:{ticks:{callback:v=>v===0?'¥0':'¥'+(v/10000).toFixed(0)+'万'},grid:{color:'rgba(0,0,0,0.05)'},border:{display:false}},x:{grid:{display:false},ticks:{autoSkip:false}}}}});}
function renderSummary(){const items=periodFilter(allData());const incItems=items.filter(e=>e.type==='income');const expItems=items.filter(e=>e.type==='expense');const incByCat={};incItems.forEach(e=>incByCat[e.cat]=(incByCat[e.cat]||0)+e.amount);const totalInc=incItems.reduce((a,b)=>a+b.amount,0);const elInc=document.getElementById('sum-income');if(!Object.keys(incByCat).length){elInc.innerHTML='<div class="empty">収入記録がありません</div>';}else{elInc.innerHTML=Object.entries(incByCat).map(([cat,amt])=>`<div class="income-row"><div style="display:flex;align-items:center;gap:7px;"><div class="dot" style="background:${CAT_COLOR[cat]||'#888'}"></div>${cat}</div><span style="color:var(--accent);font-weight:500;">${fmt(amt)}</span></div>`).join('')+`<div class="total-row"><span>合計</span><span style="color:var(--accent)">${fmt(totalInc)}</span></div>`;}const expByCat={};expItems.forEach(e=>expByCat[e.cat]=(expByCat[e.cat]||0)+e.amount);const totalExp=expItems.reduce((a,b)=>a+b.amount,0);const sorted=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);const maxAmt=sorted.length?sorted[0][1]:1;const elExp=document.getElementById('sum-expense');if(!sorted.length){elExp.innerHTML='<div class="empty">支出記録がありません</div>';}else{elExp.innerHTML=sorted.map(([cat,amt])=>`<div class="budget-row"><div style="display:flex;align-items:center;gap:6px;min-width:90px;font-size:12px;"><div class="dot" style="background:${CAT_COLOR[cat]||'#888'}"></div>${cat}</div><div class="budget-bar-wrap"><div class="budget-bar" style="width:${Math.round(amt/maxAmt*100)}%;background:${CAT_COLOR[cat]||'#888'}"></div></div><span style="min-width:70px;text-align:right;font-size:12px;font-weight:500;">${fmt(amt)}</span></div>`).join('')+`<div class="total-row"><span>合計</span><span>${fmt(totalExp)}</span></div>`;}}
function renderAll(){renderToday();renderList();renderBudget();const t=document.querySelector('.tab.active')?.getAttribute('onclick')?.match(/switchTab\('(\w+)'/);if(t){if(t[1]==='graph')renderGraph();if(t[1]==='summary')renderSummary();}}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(btn)btn.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');if(name==='graph')renderGraph();if(name==='summary')renderSummary();if(name==='list')renderList();if(name==='budget')renderBudget();}
updateLabels();
syncFromSheet();
</script>
